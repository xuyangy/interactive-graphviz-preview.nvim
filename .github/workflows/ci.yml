name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install Bun dependencies
        run: |
          bun install --cwd frontend --frozen-lockfile
          bun install --cwd server --frozen-lockfile
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4
      - name: Install Lua tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install busted
      - name: Install Stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ github.token }}
          version: latest
          args: --check .
      - name: Lua smoke
        run: nvim --headless -i NONE -u tests/minimal_init.lua -l tests/nvim_smoke.lua -c qa
      - name: Busted smoke
        run: busted tests/scaffold_spec.lua tests/session_spec.lua tests/commands_spec.lua tests/render_spec.lua
      - name: No-orphan supervision gate (NFR-3)
        run: busted tests/integration/orphan_spec.lua
      - name: Bun tests
        run: bun test server
      - name: E2E cold-open relay (Story 1.4 AC2)
        run: bun test tests/e2e/render.spec.ts
      - name: Release workflow syntax
        run: ruby -e 'require "yaml"; YAML.load_file(".github/workflows/release.yml")'
      - name: Release target smoke
        run: bun run scripts/release.ts validate-targets
      - name: Frontend bundle smoke
        run: bun build frontend/index.html --outdir dist/frontend
