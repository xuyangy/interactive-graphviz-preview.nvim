name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4
      - name: Install Lua tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install busted
      - name: Install Stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ github.token }}
          version: latest
          args: --check .
      - name: Lua smoke
        run: nvim --headless -i NONE -u tests/minimal_init.lua -l tests/nvim_smoke.lua -c qa
      - name: Busted smoke
        run: busted tests/scaffold_spec.lua
      - name: Bun tests
        run: bun test server
      - name: Frontend bundle smoke
        run: bun build frontend/index.html --outdir dist/frontend
